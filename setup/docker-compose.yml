services:
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    ports:
      - "5006:5006"
    volumes:
      - ./data:/data
    environment:
      - ACTUAL_ALLOW_SHARED_ARRAY_BUFFER=true

  # Optional: HTTPS reverse proxy for Safari/mobile access
  # Uncomment if you need HTTPS (required for Safari's SharedArrayBuffer)
